# JVM arguments for Gradle daemon
# Increased memory allocation for Gradle build process
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:+HeapDumpOnOutOfMemoryError

# Android X and Jetifier settings
android.useAndroidX=true
android.enableJetifier=true

# Kotlin code style
kotlin.code.style=official

# Suppress unsupported option warnings
android.suppressUnsupportedOptionWarnings=android.suppressUnsupportedOptionWarnings

# Performance optimizations for faster builds
org.gradle.parallel=true
org.gradle.caching=true
android.enableBuildScaling=true

# Gradle configuration cache for improved build performance
org.gradle.configuration-cache=true
