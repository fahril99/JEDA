pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        def localPropsFile = file("local.properties")
        
        // Try to read from local.properties first
        if (localPropsFile.exists()) {
            localPropsFile.withInputStream { properties.load(it) }
            def sdkPath = properties.getProperty("flutter.sdk")
            if (sdkPath != null) {
                return sdkPath
            }
        }
        
        // Fallback for CI/CD environments (GitHub Actions, etc.)
        def flutterHome = System.getenv("FLUTTER_HOME")
        if (flutterHome != null && !flutterHome.isEmpty()) {
            return flutterHome
        }
        
        // Last resort: try FLUTTER_SDK environment variable
        def flutterSdk = System.getenv("FLUTTER_SDK")
        if (flutterSdk != null && !flutterSdk.isEmpty()) {
            return flutterSdk
        }
        
        throw new GradleException(
            "Flutter SDK not found. Please ensure:\n" +
            "  1. local.properties exists with flutter.sdk=/path/to/flutter\n" +
            "  2. OR set FLUTTER_HOME environment variable\n" +
            "  3. OR set FLUTTER_SDK environment variable"
        )
    }()

    includeBuild("${flutterSdkPath}/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.3.0" apply false
    id "org.jetbrains.kotlin.android" version "1.9.23" apply false
}

include ":app"
